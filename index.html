const tod=()=>new Date().toISOString().split('T')[0];
const fD=s=>{const d=new Date(s+'T12:00:00'),D=['Sön','Mån','Tis','Ons','Tor','Fre','Lör'],M=['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];return `${D[d.getDay()]} ${d.getDate()} ${M[d.getMonth()]}`;};
const fDL=s=>{const d=new Date(s+'T12:00:00'),D=['Söndag','Måndag','Tisdag','Onsdag','Torsdag','Fredag','Lördag'],M=['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];return `${D[d.getDay()]} ${d.getDate()} ${M[d.getMonth()]}`;};
const gwk=wo=>{const w=wo.map(x=>parseInt(x.week)).filter(x=>!isNaN(x)&&x>0);return w.length?Math.max(...w):22;};
const gStep=(st,wk)=>{for(const s of st)if(wk>=s.w[0]&&wk<=s.w[1])return s;return wk>st[st.length-1].w[1]?st[st.length-1]:st[0];};
const gBKg=(wo,n,wk)=>{let b=null;wo.forEach(w=>{if(parseInt(w.week)!==wk||!w.exercises)return;w.exercises.forEach(e=>{if(e.name===n&&e.kg){const kg=parseFloat(e.kg);if(!b||kg>b.kg)b={kg,sets:parseInt(e.sets)||0,reps:parseInt(e.reps)||0};}});});return b;};
const gBRp=(wo,n,wk)=>{let b=null;wo.forEach(w=>{if(parseInt(w.week)!==wk||!w.exercises)return;w.exercises.forEach(e=>{if(e.name===n&&e.reps){const r=parseInt(e.reps);if(!b||r>b.reps)b={reps:r,sets:parseInt(e.sets)||0,kg:parseFloat(e.kg)||0};}});});return b;};
const cMac=(arr,i,g)=>{if(i<0||!arr[i])return{k:0,p:0};const x=arr[i],r=g/100;return{k:Math.round(x.k*r),p:Math.round(x.p*r)};};
const gInit=n=>{if(!n)return '?';return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);};
function updSlider(el){if(!el)return;const v=(el.value-el.min)/(el.max-el.min)*100;el.style.background=`linear-gradient(to right,var(--green) ${v}%,var(--s3) ${v}%)`;}
function getPlan(pr){
  if(!pr)return DP;
  if(pr.custom_schedule&&Object.keys(pr.custom_schedule).length>0){const p={...DP};Object.keys(pr.custom_schedule).forEach(d=>{if(p[d])p[d]={...p[d],ex:pr.custom_schedule[d]};});return p;}
  const g=pr.goals&&pr.goals[0];return (g&&GP[g])||DP;
}

// ── SHARED ─────────────────────────────────────────────────────
function PBar({label,val,max,unit=''}){
  const pct=Math.min(100,Math.round((val/Math.max(max,1))*100));
  const col=pct>=95?'var(--green)':pct>=70?'var(--amber)':'var(--blue)';
  return <div className="pbar-wrap"><div className="pbar-row"><span className="pbar-label">{label}</span><span className="pbar-nums">{val}/{max}{unit}{pct>=95?' ✅':''}</span></div><div className="pbar-bg"><div className="pbar-fill" style={{width:pct+'%',background:col}}/></div></div>;
}
const Chip=({c,t})=><span className={`chip ${c||'cx'}`}>{t}</span>;
function Slider({min=0,max=10,value,onChange,lo,hi}){
  const ref=useRef();
  useEffect(()=>{if(ref.current)updSlider(ref.current);},[value]);
  return <div><div className="sv">{value}</div><input ref={ref} type="range" min={min} max={max} value={value} onInput={e=>{updSlider(e.target);onChange(+e.target.value);}}/><div className="sl"><span>{lo}</span><span>{hi}</span></div></div>;
}
function BNav({tab,setTab,isAdmin}){
  const items=[{id:'today',ic:'🏠',lb:'Idag'},{id:'train',ic:'💪',lb:'Träning'},{id:'food',ic:'🍽️',lb:'Mat'},{id:'prog',ic:'📈',lb:'Progress'}];
  if(isAdmin)items.push({id:'admin',ic:'🔧',lb:'Admin'});
  return <nav className="bnav">{items.map(i=><button key={i.id} className={`ni${tab===i.id?' active':''}`} onClick={()=>setTab(i.id)}><span className="ni-icon">{i.ic}</span>{i.lb}</button>)}</nav>;
}

// ── AUTH ────────────────────────────────────────────────────────
function AuthScreen(){
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');const [pw,setPw]=useState('');const [name,setName]=useState('');
  const [msg,setMsg]=useState(null);const [busy,setBusy]=useState(false);
  async function go(){
    if(!email||!pw)return setMsg({t:'e',m:'Fyll i e-post och lösenord.'});
    setBusy(true);setMsg(null);
    if(mode==='signup'){
      const {error}=await sb.auth.signUp({email,password:pw,options:{data:{name},emailRedirectTo:window.location.href}});
      if(error)setMsg({t:'e',m:error.message});
      else setMsg({t:'o',m:'✅ Konto skapat! Kolla mejlen (även skräppost) — bekräfta länken, logga sedan in.'});
    }else{
      const {error}=await sb.auth.signInWithPassword({email,password:pw});
      if(error)setMsg({t:'e',m:error.message==='Invalid login credentials'?'Fel e-post eller lösenord. Har du bekräftat mejlen?':error.message});
    }
    setBusy(false);
  }
  return <div className="aw"><div className="al">🏋️</div><div className="at">FitTrack</div><div className="as">Din personliga träningsapp</div>
    <div className="a-tabs"><button className={`a-tab${mode==='login'?' active':''}`} onClick={()=>{setMode('login');setMsg(null);}}>Logga in</button><button className={`a-tab${mode==='signup'?' active':''}`} onClick={()=>{setMode('signup');setMsg(null);}}>Skapa konto</button></div>
    {msg&&<div className={`msg ${msg.t==='e'?'me':'mo'}`}>{msg.m}</div>}
    {mode==='signup'&&<div className="field"><label>Namn</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Ditt namn"/></div>}
    <div className="field"><label>E-post</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="din@mejl.se" autoComplete="email"/></div>
    <div className="field"><label>Lösenord</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Minst 6 tecken" autoComplete={mode==='signup'?'new-password':'current-password'}/></div>
    <button className="btn btn-primary btn-full" disabled={busy} onClick={go} style={{marginTop:8}}>{busy?'...':mode==='login'?'Logga in':'Skapa konto'}</button>
    {mode==='login'&&<p style={{textAlign:'center',fontSize:11,color:'var(--t2)',marginTop:10}}>Testanvändare: test@fittrack.app / Test1234!</p>}

const HO=[{id:'Inga besvär',ic:'✅',lb:'Inga besvär'},{id:'Ljumske/groin',ic:'🦵',lb:'Ljumske'},{id:'Knäbesvär',ic:'🦿',lb:'Knä'},{id:'Ryggbesvär',ic:'🔙',lb:'Rygg'},{id:'Axelbesvär',ic:'💪',lb:'Axel'},{id:'Annat',ic:'🩹',lb:'Annat'}];

  const [busy,setBusy]=useState(false);
  const tg=g=>goals.includes(g)?goals.filter(x=>x!==g):[...goals,g];
  const th=h=>{if(h==='Inga besvär')return['Inga besvär'];return health.filter(x=>x!=='Inga besvär').includes(h)?health.filter(x=>x!==h):[...health.filter(x=>x!=='Inga besvär'),h];};
  async function finish(){
    setBusy(true);

    await sb.from('user_profiles').upsert({user_id:session.user.id,email:session.user.email,display_name:name,age_range:age,weight_kg:parseFloat(wt)||null,height_cm:parseFloat(ht)||null,goals,health_conditions:health,show_groin:sg,is_referee:isRef,schedule_type:goals[0]||'custom',onboarding_done:true},{onConflict:'user_id'});

  const st=['Välkommen','Om dig','Mål','Hälsa'];

      <div className="field" style={{marginBottom:18}}><label>Aktiv domare/referee?</label><div className="pr" style={{marginTop:8,marginBottom:0}}><button className={`pp${isRef?' sel':''}`} onClick={()=>setIsRef(true)}>Ja, jag dömer</button><button className={`pp${!isRef?' sel':''}`} onClick={()=>setIsRef(false)}>Nej</button></div></div>
      <button className="btn btn-primary btn-full" onClick={()=>setStep(2)}>Nästa →</button></>}
    {step===2&&<><div className="ot">Ditt mål?</div><div className="os" style={{marginBottom:16}}>Välj ett eller flera</div><div className="pg">{GO.map(g=><button key={g.id} className={`pb${goals.includes(g.id)?' sel':''}`} onClick={()=>setGoals(tg(g.id))}><span className="pb-icon">{g.ic}</span>{g.lb}</button>)}</div><button className="btn btn-primary btn-full" disabled={goals.length===0} onClick={()=>setStep(3)}>Nästa →</button></>}
    {step===3&&<><div className="ot">Hälsostatus</div><div className="os" style={{marginBottom:16}}>Anpassar vad du ser under träning</div><div className="pg">{HO.map(h=><button key={h.id} className={`pb${health.includes(h.id)?' sel':''}`} onClick={()=>setHealth(th(h.id))}><span className="pb-icon">{h.ic}</span>{h.lb}</button>)}</div><button className="btn btn-primary btn-full" disabled={health.length===0||busy} onClick={finish}>{busy?'Sparar...':'Skapa schema 🚀'}</button></>}
  </div></div>;

// ── WEEKLY STATS ──────────────────────────────────────────────
function WeeklyStatsCard({workouts}){
  const now=new Date();
  const dow=now.getDay();
  const mon=new Date(now);mon.setDate(now.getDate()-((dow+6)%7));
  const DAYS=['Mån','Tis','Ons','Tor','Fre','Lör','Sön'];
  const wd=DAYS.map((lb,i)=>{
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const ds=d.toISOString().split('T')[0];
    const dw=workouts.filter(w=>w.date===ds);
    const min=dw.reduce((t,w)=>t+(parseInt(w.duration)||0),0);
    const hasGym=dw.some(w=>w.type&&w.type.toLowerCase().includes('gym'));
    const hasCardio=dw.some(w=>isPureCardio(w.type));
    const hasFoot=dw.some(w=>w.type&&(w.type.includes('Fotboll')||w.type.includes('Match')));
    const hasRef=dw.some(w=>w.type&&w.type.includes('Dömt'));
    const col=hasRef?'var(--amber)':hasGym?'var(--blue)':hasCardio?'var(--amber)':hasFoot?'var(--green)':dw.length>0?'var(--green)':'var(--s3)';
    return {lb,ds,dw,min,isToday:ds===tod(),isFuture:ds>tod(),cnt:dw.length,col};
  });
  const tot=wd.reduce((t,d)=>({
    p:t.p+d.cnt,
    m:t.m+d.min,
    s:t.s+d.dw.filter(w=>w.type&&w.type.toLowerCase().includes('gym')).length,
    k:t.k+d.dw.filter(w=>isPureCardio(w.type)||(w.type&&w.type.includes('Fotboll'))).length,
  }),{p:0,m:0,s:0,k:0});
  const mx=Math.max(...wd.map(d=>d.min),45);
  const wk=gwk(workouts);
  return <div className="card" style={{marginBottom:12}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <span style={{fontSize:13,fontWeight:700}}>📊 Veckans träning</span>
      <span style={{fontSize:11,color:'var(--t2)',fontWeight:500,background:'var(--s3)',padding:'2px 8px',borderRadius:6}}>v.{wk}</span>
    </div>
    {/* Bar chart per day */}
    <div className="wk-grid">
      {wd.map((d,i)=>{
        const barH=d.min>0?Math.max(6,Math.round(d.min/mx*44)):d.cnt>0?4:0;
        return <div key={i} className="wk-col">
          <div className="wk-lbl" style={{color:d.isToday?'var(--green)':'var(--t2)'}}>{d.lb}</div>
          <div className="wk-bar-wrap" style={{outline:d.isToday?'1px solid var(--gdim)':'none'}}>
            {barH>0&&<div className="wk-bar" style={{height:barH+'px',background:d.col}}/>}
          </div>
          <div className="wk-min">{d.min>0?d.min+'m':d.cnt>0?'✓':''}</div>
        </div>;
      })}
    </div>
    {/* Stats grid */}
    <div className="stat-grid">
      {[
        {ic:'🏆',v:tot.p,lb:'Pass',c:'var(--green)'},
        {ic:'⏱',v:tot.m,lb:'Minuter',c:'var(--blue)'},
        {ic:'💪',v:tot.s,lb:'Styrka',c:'var(--blue)'},
        {ic:'🏃',v:tot.k,lb:'Kondition',c:'var(--amber)'},
      ].map((s,i)=><div key={i} className="stat-box">
        <div style={{fontSize:18}}>{s.ic}</div>
        <div className="stat-val" style={{color:s.v>0?s.c:'var(--t3)'}}>{s.v}</div>
        <div className="stat-lbl">{s.lb}</div>
      </div>)}
    </div>
    {tot.p===0&&<div style={{fontSize:12,color:'var(--t3)',textAlign:'center',marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}}>Inga pass loggade denna vecka ännu</div>}
  </div>;
}

      {isRef&&<><div className="ct" style={{marginTop:4}}>Matchinfo</div><div className="c2" style={{marginBottom:8}}><div className="field"><label>Kön</label><select value={form.rGen} onChange={e=>setForm(f=>({...f,rGen:e.target.value}))}><option>Herr</option><option>Dam</option><option>Mixed/Ungdom</option></select></div><div className="field"><label>Roll</label><select value={form.rRole} onChange={e=>setForm(f=>({...f,rRole:e.target.value}))}><option>Huvuddomare</option><option>Assistent</option><option>Fjärde domare</option></select></div></div><div className="field"><label>Matchnivå</label><select value={form.rLvl} onChange={e=>setForm(f=>({...f,rLvl:e.target.value}))}><option value="">Välj...</option>{REF_LVL.map(l=><option key={l}>{l}</option>)}</select></div><div className="field"><label>Tid (min)</label><input type="number" value={form.dur} onChange={e=>setForm(f=>({...f,dur:e.target.value}))} placeholder="90"/></div></>}
      {/* Gym/Football — exercise form */}
      {!isAnyCardio&&!isRef&&<div className="field">
        <label>Tid (min)</label>
        <input type="number" value={form.dur} onChange={e=>setForm(f=>({...f,dur:e.target.value}))} placeholder="60" style={{marginBottom:8}}/>
        <label>Övningar</label>
        <div style={{display:'grid',gridTemplateColumns:'1fr 40px 40px 55px auto',gap:5,marginBottom:6}}>
          <select value={exS} onChange={e=>setExS(e.target.value)} style={{fontSize:12,padding:'7px 8px'}}><option value="">Övning...</option>{Object.entries(allExG).map(([g,es])=><optgroup key={g} label={g}>{es.map(e=><option key={e}>{e}</option>)}</optgroup>)}</select>
          <input type="number" value={exSt} onChange={e=>setExSt(e.target.value)} placeholder="Set" style={{fontSize:12,padding:'7px 4px',textAlign:'center'}}/>
          <input type="number" value={exRp} onChange={e=>setExRp(e.target.value)} placeholder="Rep" style={{fontSize:12,padding:'7px 4px',textAlign:'center'}}/>
          <input type="number" step="0.5" value={exKg} onChange={e=>setExKg(e.target.value)} placeholder="kg" style={{fontSize:12,padding:'7px 4px',textAlign:'center'}}/>
          <button className="btn btn-secondary btn-sm" onClick={addEx} style={{padding:'7px 10px'}}>+</button>
        </div>
        <div className="ex-chips">{curEx.length===0&&<span style={{fontSize:12,color:'var(--t3)'}}>Inga övningar än</span>}{curEx.map((e,i)=><div key={i} className="ex-chip">{e.name}{e.sets&&e.reps?` ${e.sets}×${e.reps}`:''}{e.kg?` @ ${e.kg}kg`:''}<button onClick={()=>setCurEx(p=>p.filter((_,j)=>j!==i))}>×</button></div>)}</div>
      </div>}
      <div className="field"><label>RPE — Ansträngning</label><Slider min={1} max={10} value={form.rpe} onChange={v=>setForm(f=>({...f,rpe:v}))} lo="Lätt (1)" hi="Max (10)"/></div>
      {showGroin&&<div className="field"><label>🦵 Ljumske — Obehag</label><Slider min={0} max={10} value={form.groin} onChange={v=>setForm(f=>({...f,groin:v}))} lo="Ingen (0)" hi="Allvarlig (10)"/></div>}
      <div className="field"><label>Anteckningar</label><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Hur kändes passet..."/></div>
      <button className="btn btn-primary btn-full" disabled={busy} onClick={save}>{busy?'Sparar...':'Spara pass'}</button>
    </div>}
    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>{['all','Gym','Fotboll','Löpning','Match','Dömt'].map(f=><button key={f} className={`qa-cat${filter===f?' active':''}`} onClick={()=>setFilter(f)}>{f==='all'?'Alla':f}</button>)}</div>
    {filtered.length===0&&<div className="empty">Inga pass loggade.<br/>Tryck "+ Logga" för att börja.</div>}
    {filtered.map(w=>{
      const gc=parseInt(w.groin)>=4?'cr':parseInt(w.groin)>=2?'ca':'cg';
      const cEx=w.exercises&&w.exercises.length===1&&(w.exercises[0].distance||w.exercises[0].duration);
      return <div key={w.id} className="le"><div className="le-head"><div><div className="le-title">{w.type}</div><div style={{fontSize:11,color:'var(--t2)',marginTop:2}}>{w.week?`V${w.week} · `:''}{fD(w.date)}</div></div><button className="db" onClick={()=>{if(confirm('Ta bort?'))delWo(w.id);}}>×</button></div>
        <div className="le-meta">{w.duration&&<Chip c="cx" t={`${w.duration} min`}/>}{cEx&&w.exercises[0].distance&&<Chip c="ca" t={`📍 ${w.exercises[0].distance} km`}/>}{cEx&&w.exercises[0].speed&&<Chip c="ca" t={`⚡ ${w.exercises[0].speed} km/h`}/>}<Chip c="cx" t={`RPE ${w.rpe}`}/>{(showGroin||w.groin>0)&&<Chip c={gc} t={`🦵 ${w.groin}/10`}/>}{w.match_details&&<><Chip c="ca" t={w.match_details.level||'?'}/><Chip c="cx" t={w.match_details.gender||''}/></>}</div>
        {!cEx&&w.exercises&&w.exercises.length>0&&<div className="le-exs">{w.exercises.map((e,i)=><div key={i} className="le-ex"><span style={{color:'var(--t1)',fontWeight:500}}>{e.name}</span><span>{[e.sets&&e.reps&&`${e.sets}×${e.reps}`,e.kg&&`${e.kg}kg`].filter(Boolean).join(' · ')}</span></div>)}</div>}
        {w.notes&&<div style={{fontSize:12,color:'var(--t2)',marginTop:6,paddingTop:6,borderTop:'1px solid var(--border)'}}>{w.notes}</div>}
      </div>;
    })}
  </div></div>;
}



// ── FOOD — UNIFIED PLANNER + LOG ────────────────────────────────
const INIT_MLB={pI:-1,pG:200,cI:-1,cG:100,vI:-1,vG:150,fI:0};
function FoodScreen({meals,mealsDone,addMeal,delMeal,setDayDone,profile}){
  const [dt,setDt]=useState(DAY_TM[new Date().getDay()]);
  const [vd,setVd]=useState(tod());
  const [qCat,setQCat]=useState('Snack');
  const [showPlan,setShowPlan]=useState(true);
  const [showQA,setShowQA]=useState(false);
  // Planner state
  const [bfSel,setBfSel]=useState(-1);
  const [lMlb,setLMlb]=useState({...INIT_MLB});
  const [dMlb,setDMlb]=useState({...INIT_MLB});
  const [preSel,setPreSel]=useState(-1);
  const [kvSel,setKvSel]=useState(-1);
  const [ca,setCa]=useState({n:'',k:'',p:''});
  const tgt=DT[dt];
  const entries=meals[vd]||[];
  const tot=entries.reduce((t,e)=>({kcal:t.kcal+(e.kcal||0),protein:t.protein+(e.protein||0)}),{kcal:0,protein:0});
  const isDone=!!mealsDone[vd];
  const isToday=vd===tod();
  const isFuture=vd>tod();
  const isPast=vd<tod();
  // ✅ FIX: Ingen spärr på framtida datum — planering tillåts framåt
  const navD=d=>{const x=new Date(vd+'T12:00:00');x.setDate(x.getDate()+d);setVd(x.toISOString().split('T')[0]);};
  const surplus=tot.kcal>tgt.k+200;
  const rem={k:tgt.k-tot.kcal,p:tgt.p-tot.protein};
  // Lunch builder
  const lPN=lMlb.pI>=0&&PROT[lMlb.pI]?PROT[lMlb.pI].n:'';
  const lCR=lPN&&PAIR[lPN]?PAIR[lPN]:'';const lCRI=lCR?CARB.findIndex(x=>x.n===lCR):-1;const lECI=lMlb.cI>=0?lMlb.cI:lCRI;
  const lMP=cMac(PROT,lMlb.pI,lMlb.pG),lMC=cMac(CARB,lECI,lMlb.cG),lMV=cMac(VEGG,lMlb.vI,lMlb.vG);const lFk=lMlb.fI>0&&FETT[lMlb.fI]?FETT[lMlb.fI].k:0;
  const lTot={k:lMP.k+lMC.k+lMV.k+lFk,p:lMP.p+lMC.p+lMV.p};
  // Middag builder
  const dPN=dMlb.pI>=0&&PROT[dMlb.pI]?PROT[dMlb.pI].n:'';
  const dCR=dPN&&PAIR[dPN]?PAIR[dPN]:'';const dCRI=dCR?CARB.findIndex(x=>x.n===dCR):-1;const dECI=dMlb.cI>=0?dMlb.cI:dCRI;
  const dMP=cMac(PROT,dMlb.pI,dMlb.pG),dMC=cMac(CARB,dECI,dMlb.cG),dMV=cMac(VEGG,dMlb.vI,dMlb.vG);const dFk=dMlb.fI>0&&FETT[dMlb.fI]?FETT[dMlb.fI].k:0;
  const dTot={k:dMP.k+dMC.k+dMV.k+dFk,p:dMP.p+dMC.p+dMV.p};
  function bldName(mlb,eCI){const parts=[];if(mlb.pI>=0)parts.push(`${mlb.pG}g ${PROT[mlb.pI].n}`);if(eCI>=0&&CARB[eCI]&&CARB[eCI].k>0)parts.push(`${mlb.cG}g ${CARB[eCI].n.replace(' (torrt)','').replace(' (rå)','').replace(' Frebaco','')}`);if(mlb.vI>=0&&VEGG[mlb.vI])parts.push(`${mlb.vG}g ${VEGG[mlb.vI].n}`);if(mlb.fI>0)parts.push(FETT[mlb.fI].n);return parts.join(' + ')||'Måltid';}
  const planCount=[bfSel>=0?1:0,lTot.k>0?1:0,(dt==='tuesday'||dt==='football')&&preSel>=0?1:0,dTot.k>0?1:0,kvSel>=0?1:0].reduce((a,b)=>a+b,0);
  function addAllPlanned(){
    if(bfSel>=0){const f=BF_OPT[bfSel];addMeal(vd,f.n,f.k,f.p);setBfSel(-1);}
    if(lTot.k>0||lTot.p>0){addMeal(vd,bldName(lMlb,lECI),lTot.k,lTot.p);setLMlb({...INIT_MLB});}
    if(preSel>=0&&(dt==='tuesday'||dt==='football')){const f=PRE_OPT[preSel];addMeal(vd,f.n,f.k,f.p);setPreSel(-1);}
    if(dTot.k>0||dTot.p>0){addMeal(vd,bldName(dMlb,dECI),dTot.k,dTot.p);setDMlb({...INIT_MLB});}
    if(kvSel>=0){const f=KVALL_OPT[kvSel];addMeal(vd,f.n,f.k,f.p);setKvSel(-1);}
  }
  const sugs=[];
  if(!surplus&&rem.k>0&&rem.k<=150&&rem.p<=10)sugs.push({ic:'🍌',tx:`${rem.k} kcal kvar — banan (89 kcal)`,n:'1 banan',k:89,p:1});
  if(!surplus&&rem.p>0&&rem.p<=30&&rem.k<=250)sugs.push({ic:'💪',tx:`${rem.p}g protein kvar — proteinshake (+25g)`,n:'Proteinshake + vatten',k:120,p:25});
  // Compact planner slot (dropdown)
  const compSlot=(label,opts,val,setV)=><div style={{marginBottom:10}}>
    <div style={{fontSize:12,fontWeight:600,color:'var(--t2)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:5}}>{label}</div>
    <div style={{display:'flex',gap:8,alignItems:'center'}}>
      <select style={{flex:1,fontSize:13,padding:'8px 10px'}} value={val} onChange={e=>setV(+e.target.value)}>
        <option value="-1">Välj alternativ...</option>
        {opts.map((o,i)=><option key={i} value={i}>{o.n} — {o.k} kcal</option>)}
      </select>
      <button style={{padding:'8px 12px',background:'var(--green)',color:'#0a0a0a',border:'none',borderRadius:8,fontWeight:600,fontSize:12,cursor:'pointer',whiteSpace:'nowrap',opacity:val<0?.4:1}} disabled={val<0} onClick={()=>{if(val>=0){addMeal(vd,opts[val].n,opts[val].k,opts[val].p);setV(-1);}}}>+ Lägg</button>
    </div>
    {val>=0&&opts[val]&&<div style={{fontSize:11,color:'var(--t2)',marginTop:4}}>🔥 {opts[val].k} kcal · 💪 {opts[val].p}g P</div>}
  </div>;
  // Builder slot (protein + carb)
  const bldSlot=(label,mlb,setMlb,tot2,eCI,cRI,pN,cR)=><div style={{marginBottom:10}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:5}}>
      <span style={{fontSize:12,fontWeight:600,color:'var(--t2)',textTransform:'uppercase',letterSpacing:'.05em'}}>{label}</span>
      {tot2.k>0&&<span style={{fontSize:12,color:'var(--green)',fontWeight:600}}>{tot2.k} kcal · {tot2.p}g P</span>}
    </div>
    <div style={{display:'flex',gap:8,marginBottom:5}}>
      <select style={{flex:1,fontSize:13,padding:'8px 10px'}} value={mlb.pI} onChange={e=>setMlb(m=>({...m,pI:+e.target.value,cI:-1}))}>
        <option value="-1">Proteinkälla...</option>{PROT.map((x,i)=><option key={i} value={i}>{x.n}</option>)}
      </select>
      {mlb.pI>=0&&<input style={{width:60,padding:'8px 8px',textAlign:'center',fontSize:13}} type="number" value={mlb.pG} onChange={e=>setMlb(m=>({...m,pG:+e.target.value||200}))} placeholder="g"/>}
    </div>
    <div style={{display:'flex',gap:8,marginBottom:5}}>
      <select style={{flex:1,fontSize:13,padding:'8px 10px'}} value={mlb.cI>=0?mlb.cI:eCI<0?-1:eCI} onChange={e=>setMlb(m=>({...m,cI:+e.target.value}))}>
        <option value="-1">Kolhydrat...</option>{CARB.map((x,i)=><option key={i} value={i}>{x.n}</option>)}
      </select>
      {(mlb.cI>=0||(eCI>=0&&eCI<CARB.length))&&<input style={{width:60,padding:'8px 8px',textAlign:'center',fontSize:13}} type="number" value={mlb.cG} onChange={e=>setMlb(m=>({...m,cG:+e.target.value||0}))} placeholder="g"/>}
    </div>
    {pN&&cR&&<div style={{fontSize:11,color:'var(--blue)',background:'var(--bbg)',borderRadius:6,padding:'5px 8px',marginBottom:5}}>💡 Med {mlb.pG}g {pN.toLowerCase()} → {mlb.cG}g {cR.replace(' (torrt)','').replace(' (rå)','').replace(' Frebaco','')} rekommenderas</div>}
    <div style={{display:'flex',gap:8,marginBottom:5}}>
      <select style={{flex:2,fontSize:13,padding:'8px 10px'}} value={mlb.vI} onChange={e=>setMlb(m=>({...m,vI:+e.target.value}))}>
        <option value="-1">Grönsaker (valfritt)...</option>{VEGG.map((x,i)=><option key={i} value={i}>{x.n}</option>)}
      </select>
      <select style={{flex:2,fontSize:13,padding:'8px 10px'}} value={mlb.fI} onChange={e=>setMlb(m=>({...m,fI:+e.target.value}))}>
        {FETT.map((x,i)=><option key={i} value={i}>{x.n}</option>)}
      </select>
    </div>
    <button style={{width:'100%',padding:'9px',background:tot2.k>0?'var(--green)':'var(--s3)',color:tot2.k>0?'#0a0a0a':'var(--t3)',border:'none',borderRadius:8,fontWeight:600,fontSize:13,cursor:tot2.k>0?'pointer':'default',fontFamily:'inherit'}} disabled={!tot2.k&&!tot2.p} onClick={()=>{addMeal(vd,bldName(mlb,eCI),tot2.k,tot2.p);setMlb({...INIT_MLB});}}>
      {tot2.k>0?`+ Lägg till (${tot2.k} kcal · ${tot2.p}g P)`:'Välj protein och kolhydrat'}
    </button>
  </div>;

  return <div className="screen"><div className="pad">
    {/* Header */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
      <h2>Mat</h2>
      <select value={dt} onChange={e=>setDt(e.target.value)} style={{width:'auto',fontSize:11,padding:'5px 8px',maxWidth:185}}>{Object.entries(DT).map(([k,v])=><option key={k} value={k}>{v.lb}</option>)}</select>
    </div>
    {/* Date nav — ingen spärr på framtida datum */}
    <div className="datenav">
      <button className="datenav-btn" onClick={()=>navD(-1)}>‹</button>
      <input type="date" value={vd} onChange={e=>setVd(e.target.value)}/>
      <button className="datenav-btn" onClick={()=>navD(1)}>›</button>
    </div>
    {isFuture&&<div className="future-badge">🗓️ Planering: {fD(vd)}</div>}
    {isPast&&<div className="past-badge">📋 Historik: {fD(vd)}</div>}
    {/* Progress — alltid synlig */}
    <div className="card">
      <div className="ct">Dagstotal · {tgt.k} kcal mål</div>
      <PBar label="🔥 Kalorier" val={tot.kcal} max={tgt.k} unit=" kcal"/>
      <PBar label="💪 Protein" val={tot.protein} max={tgt.p} unit="g"/>
    </div>
    {surplus&&!isDone&&<div style={{background:'var(--rbg)',border:'1px solid #7f1d1d',borderRadius:11,padding:'11px 13px',marginBottom:10}}><div style={{fontSize:13,fontWeight:600,color:'var(--red)',marginBottom:3}}>⚠️ Kaloriöverskott +{tot.kcal-tgt.k} kcal</div><div style={{fontSize:12,color:'var(--t2)',lineHeight:1.5}}>{dt==='rest'?'Vilodagar bör ha underskott för viktnedgång.':'Justera kvällssnacket eller middagen.'}</div></div>}
    {sugs.length>0&&isToday&&!isDone&&<div style={{background:'var(--abg)',border:'1px solid #78350f',borderRadius:11,padding:'11px 13px',marginBottom:10}}><div style={{fontSize:11,fontWeight:600,color:'var(--amber)',textTransform:'uppercase',marginBottom:7}}>💡 Nå målet</div>{sugs.map((s,i)=><div key={i} className="sug-item"><span style={{fontSize:16}}>{s.ic}</span><span className="sug-text">{s.tx}</span><button className="sug-add" onClick={()=>addMeal(vd,s.n,s.k,s.p)}>+ Lägg</button></div>)}</div>}
    {isDone?<DoneCard tot={tot} tgt={tgt} cnt={entries.length} onUndo={()=>setDayDone(vd,false)}/>:<>
      {/* ── PLANNER: idag + framtid ── */}
      {!isPast&&<>
        <div className="sec-tog" onClick={()=>setShowPlan(p=>!p)}>
          <div className="sec-tog-title">
            📋 {isFuture?`Planera ${fD(vd)}`:'Planera dagens måltider'}
            {planCount>0&&<span className="sec-tog-badge">{planCount}</span>}
          </div>
          <span className={`coll-icon${showPlan?' open':''}`}>▼</span>
        </div>
        {showPlan&&<div className="plan-content">
          {compSlot('🌅 Frukost',BF_OPT,bfSel,setBfSel)}
          {bldSlot('☀️ Lunch',lMlb,setLMlb,lTot,lECI,lCRI,lPN,lCR)}
          {(dt==='tuesday'||dt==='football')&&compSlot('⚡ Pre-session snack',PRE_OPT,preSel,setPreSel)}
          {bldSlot('🌙 Middag',dMlb,setDMlb,dTot,dECI,dCRI,dPN,dCR)}
          {compSlot('🌑 Kvällssnack',KVALL_OPT,kvSel,setKvSel)}
          {planCount>1&&<button style={{width:'100%',marginTop:8,padding:'11px',background:'var(--gbg)',color:'var(--green)',border:'1px solid var(--gdim)',borderRadius:9,fontWeight:600,fontSize:13,cursor:'pointer',fontFamily:'inherit'}} onClick={addAllPlanned}>📋 Lägg till alla {planCount} planerade måltider i logg</button>}
        </div>}
      </>}
      {/* ── SNABBLÄGG: bara idag ── */}
      {isToday&&<>
        <div className="sec-tog" onClick={()=>setShowQA(p=>!p)}>
          <div className="sec-tog-title">➕ Snabblägg till</div>
          <span className={`coll-icon${showQA?' open':''}`}>▼</span>
        </div>
        {showQA&&<div style={{background:'var(--s2)',border:'1px solid var(--border)',borderRadius:11,padding:'12px 14px',marginBottom:8}}>
          <div className="qa-cats">{Object.keys(QI).map(c=><button key={c} className={`qa-cat${qCat===c?' active':''}`} onClick={()=>setQCat(c)}>{c}</button>)}</div>
          {QI[qCat].map((f,i)=><div key={i} className="qa-item"><div><div className="qi-name">{f.n}</div><div className="qi-mac">🔥 {f.k} · 💪 {f.p}g</div></div><button className="qi-add" onClick={()=>addMeal(vd,f.n,f.k,f.p)}>+</button></div>)}
          <div className="custom-row"><input type="text" value={ca.n} onChange={e=>setCa(c=>({...c,n:e.target.value}))} placeholder="Annat..."/><input type="number" value={ca.k} onChange={e=>setCa(c=>({...c,k:e.target.value}))} placeholder="kcal"/><input type="number" value={ca.p} onChange={e=>setCa(c=>({...c,p:e.target.value}))} placeholder="prot"/><button className="btn btn-secondary btn-sm" onClick={()=>{if(!ca.n||!ca.k)return;addMeal(vd,ca.n,+ca.k,+ca.p||0);setCa({n:'',k:'',p:''});}}>+</button></div>
        </div>}
      </>}

      {/* ── LOGGAT ── */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,marginTop:4}}>
        <span style={{fontSize:13,fontWeight:600,color:'var(--t2)',textTransform:'uppercase',letterSpacing:'.05em'}}>Loggat {isToday?'idag':isFuture?'(planerat)':fD(vd)}</span>
        <span style={{fontSize:12,color:tot.kcal>0?'var(--green)':'var(--t3)',fontWeight:600}}>{tot.kcal} kcal · {tot.protein}g P</span>
      </div>
      {entries.length===0&&<div className="empty" style={{padding:'20px 0',fontSize:12}}>{isPast?'Ingen mat loggad detta datum.':isFuture?'Planera ovan och lägg till i logg.':'Planera eller snabblägg ovan.'}</div>}
      <div style={{background:entries.length>0?'var(--s2)':'transparent',border:entries.length>0?'1px solid var(--border)':'none',borderRadius:11,padding:entries.length>0?'4px 14px':0,marginBottom:10}}>
        {entries.map(e=><div key={e.id} className="log-compact"><div className="log-compact-left"><div className="log-compact-name">{e.name}</div><div className="log-compact-mac">🔥 {e.kcal} kcal · 💪 {e.protein}g P</div></div>{isToday&&<button className="db" style={{marginLeft:8}} onClick={()=>delMeal(vd,e.id)}>×</button>}</div>)}
      </div>

      {isFuture&&entries.length>0&&<div style={{textAlign:'center',fontSize:12,color:'var(--t2)',padding:'8px 0'}}>Plan sparad för {fD(vd)} · {entries.length} måltider</div>}
      {isToday&&entries.length>0&&!isDone&&<>
        <div className="slutfor-spacer"/>
        <div className="slutfor-bar">
          <button className="btn btn-primary btn-full" onClick={()=>setDayDone(vd,true)}>

    </>}

}
function DoneCard({tot,tgt,cnt,onUndo}){

    await addWo({date:form.date,week:parseInt(form.week)||null,type:form.type,duration:parseInt(form.dur)||null,rpe:form.rpe,groin:showGroin?form.groin:0,exercises,notes:form.notes,match_details:matchDetails});

      <div className="field"><label>Anteckningar (valfritt)</label><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Hur kändes passet? Något att notera..."/></div>

    const uid=session.user.id;
    // ✅ KRITISK FIX: Alltid filtrera på user_id — löser data-isolation
    const {data:woD}=await sb.from('workouts').select('*').eq('user_id',uid).order('date',{ascending:false});
    setWo(woD||[]);
    const {data:mlD}=await sb.from('meals').select('*').eq('user_id',uid).order('created_at',{ascending:true});
    const g={};(mlD||[]).forEach(m=>{(g[m.date]=g[m.date]||[]).push(m);});setMeals(g);
    const {data:mdD}=await sb.from('meal_days').select('*').eq('user_id',uid);
    const dn={};(mdD||[]).forEach(d=>{dn[d.date]=d.completed;});setMDone(dn);
    // ✅ FIX: Skapa minimal profil vid VARJE login (gör alla synliga för admin)
    const name=session.user.user_metadata?.name||session.user.email.split('@')[0];
    await sb.from('user_profiles').upsert({user_id:uid,email:session.user.email,display_name:name},{onConflict:'user_id',ignoreDuplicates:false});
    const {data:pr}=await sb.from('user_profiles').select('*').eq('user_id',uid).maybeSingle();
    if(pr?.onboarding_done){
      setProfile(pr);
      if(pr.first_log_date&&!pr.optimize_shown){const diff=(new Date()-new Date(pr.first_log_date))/86400000;if(diff>=56)setShowOpt(true);}
    }else{setNeedOb(true);}
    const {data:exD}=await sb.from('exercises').select('*');setCustomEx(exD||[]);
    // Admin: load all data via RPC
    if(session.user.email===ADMIN){
      try{const {data:aW}=await sb.rpc('admin_get_workouts');setAllWo(aW||[]);}catch(e){console.warn('admin workouts:',e);}
      try{const {data:aU}=await sb.rpc('admin_get_users');setAllUsers(aU||[]);}catch(e){console.warn('admin users:',e);}
      try{const {data:aP}=await sb.rpc('admin_get_profiles');setAllProfiles(aP||[]);}catch(e){console.warn('admin profiles:',e);}
    }
    setLoading(false);
  }
  async function addWo(w){
    const {data}=await sb.from('workouts').insert({...w,user_id:session.user.id}).select().single();
    if(data){setWo(p=>[data,...p]);if(isAdmin)setAllWo(p=>[data,...p]);
      if(profile&&!profile.first_log_date){await sb.from('user_profiles').update({first_log_date:w.date}).eq('user_id',session.user.id);setProfile(p=>({...p,first_log_date:w.date}));}}
  }
  async function delWo(id){await sb.from('workouts').delete().eq('id',id);setWo(p=>p.filter(w=>w.id!==id));}
  async function addMeal(date,name,kcal,protein){const {data}=await sb.from('meals').insert({date,name,kcal:Math.round(kcal)||0,protein:Math.round(protein)||0,user_id:session.user.id}).select().single();if(data)setMeals(p=>({...p,[date]:[...(p[date]||[]),data]}));}
  async function delMeal(date,id){await sb.from('meals').delete().eq('id',id);setMeals(p=>({...p,[date]:(p[date]||[]).filter(e=>e.id!==id)}));}
  async function setDayDone(date,done){await sb.from('meal_days').upsert({date,completed:done,user_id:session.user.id},{onConflict:'user_id,date'});setMDone(p=>({...p,[date]:done}));}
  async function addEx(n,c){const {data}=await sb.from('exercises').insert({name:n,category:c}).select().single();if(data)setCustomEx(p=>[data,...p]);}
  async function delEx(id){await sb.from('exercises').delete().eq('id',id);setCustomEx(p=>p.filter(e=>e.id!==id));}
  async function saveSched(day,exs){const cs={...(profile?.custom_schedule||{}),[day]:exs};await sb.from('user_profiles').update({custom_schedule:cs}).eq('user_id',session.user.id);setProfile(p=>({...p,custom_schedule:cs}));}
  const mealTots=useMemo(()=>{const e=meals[tod()]||[];return e.reduce((t,x)=>({kcal:t.kcal+(x.kcal||0),protein:t.protein+(x.protein||0)}),{kcal:0,protein:0});},[meals]);

  if(loading)return <div className="ld"><div className="sp"/><div style={{fontSize:13}}>Laddar...</div></div>;
  if(!session)return <AuthScreen/>;
  if(needOb)return <Onboarding session={session} ep={profile} onDone={p=>{setProfile({...p,user_id:session.user.id});setNeedOb(false);}}/>;
  const name=profile?.display_name||session.user.email;
  return <div style={{display:'flex',flexDirection:'column',height:'100%',background:'var(--bg)'}}>
    <div className="hb"><span className="hb-logo">🏋️ FitTrack</span><button className="av-btn" onClick={()=>setShowP(true)} title="Profil">{gInit(name)}</button></div>
    {tab==='today'&&<TodayScreen wo={wo} mealTots={mealTots}
        onGoTrain={type=>{setQlType(type||'');setShowQL(true);}}
        onGoFood={()=>setTab('food')} profile={profile} onSaveSched={saveSched}/>}
    {tab==='train'&&<TrainScreen wo={wo} addWo={addWo} delWo={delWo} profile={profile} customEx={customEx}/>}
    {tab==='food'&&<FoodScreen meals={meals} mealsDone={mDone} addMeal={addMeal} delMeal={delMeal} setDayDone={setDayDone} profile={profile}/>}
    {tab==='prog'&&<ProgScreen wo={wo}/>}
    {tab==='admin'&&isAdmin&&<AdminScreen allWo={allWo} allUsers={allUsers} allProfiles={allProfiles} customEx={customEx} addEx={addEx} delEx={delEx}/>}
    <BNav tab={tab} setTab={setTab} isAdmin={isAdmin}/>
    {showP&&<ProfileSheet session={session} profile={profile} onClose={()=>setShowP(false)} onLogout={()=>{sb.auth.signOut();setShowP(false);}} onEditGoals={()=>{setShowP(false);setNeedOb(true);}}/>}
    {showQL&&<QuickLogSheet profile={profile} customEx={customEx} addWo={addWo}
        onClose={()=>setShowQL(false)} preType={qlType} weekNum={gwk(wo)}/>}
    {showOpt&&<div className="opt-ov"><div className="opt-card"><div style={{fontSize:44,marginBottom:10}}>🚀</div><div style={{fontSize:18,fontWeight:700,marginBottom:7}}>Dags att optimera!</div><div style={{fontSize:14,color:'var(--t2)',lineHeight:1.6,marginBottom:18}}>Du har tränat i ~2 månader! Vill du uppdatera mål och schema?</div><button className="btn btn-primary btn-full" style={{marginBottom:8}} onClick={()=>{setShowOpt(false);setNeedOb(true);sb.from('user_profiles').update({optimize_shown:true}).eq('user_id',session.user.id);}}>Ja, uppdatera!</button><button className="btn btn-ghost btn-full btn-sm" onClick={async()=>{setShowOpt(false);await sb.from('user_profiles').update({optimize_shown:true}).eq('user_id',session.user.id);}}>Inte nu</button></div></div>}
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));</script>
</body>
</html>
