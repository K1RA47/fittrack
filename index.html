<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>FitTrack</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--s1:#141414;--s2:#1c1c1c;--s3:#242424;
  --border:#2a2a2a;--border2:#333;
  --t1:#f0f0f0;--t2:#8a8a8a;--t3:#555;
  --green:#4ade80;--green-bg:#0c2318;--green-dim:#166534;
  --blue:#60a5fa;--blue-bg:#0c1e36;
  --amber:#fbbf24;--amber-bg:#2d1f08;
  --red:#f87171;--red-bg:#2d0f0f;
  --nav:60px;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5}
#root{height:100%;display:flex;flex-direction:column}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 calc(var(--nav)+var(--safe-b)+8px);-webkit-overflow-scrolling:touch}
.pad{padding:16px}
.card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--t2);text-transform:uppercase;margin-bottom:10px}
h2{font-size:22px;font-weight:700;letter-spacing:-.5px}
/* PROGRESS BARS */
.pbar-wrap{margin-bottom:14px}
.pbar-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.pbar-label{font-size:13px;font-weight:600}
.pbar-nums{font-size:12px;color:var(--t2)}
.pbar-bg{height:7px;background:var(--s3);border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;transition:width .4s}
/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:12px 18px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;user-select:none}
.btn:active{opacity:.75;transform:scale(.97)}
.btn-primary{background:var(--green);color:#0a0a0a}
.btn-secondary{background:var(--s3);color:var(--t1);border:1px solid var(--border2)}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border)}
.btn-danger{background:var(--red-bg);color:var(--red)}
.btn-full{width:100%}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:8px}
.btn:disabled{opacity:.35;cursor:default}
.btn-row{display:flex;gap:8px;margin-top:4px}
/* FORMS */
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
select,input:not([type=range]):not([type=checkbox]),textarea{width:100%;padding:10px 12px;background:var(--s1);border:1px solid var(--border2);border-radius:9px;color:var(--t1);font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none}
select:focus,input:focus,textarea:focus{border-color:var(--green)}
textarea{resize:none;min-height:64px}
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cols3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* SLIDERS */
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;outline:none;border:none;padding:0;cursor:pointer;background:var(--s3)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--green);cursor:pointer;border:3px solid var(--bg);box-shadow:0 0 0 2px var(--green),0 2px 8px rgba(74,222,128,.3)}
input[type=range]::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:var(--green);cursor:pointer;border:3px solid var(--bg);box-shadow:0 0 0 2px var(--green)}
.slider-val{font-size:24px;font-weight:800;text-align:center;color:var(--green);margin-bottom:4px}
.slider-labels{display:flex;justify-content:space-between;margin-top:4px}
.slider-labels span{font-size:10px;color:var(--t3)}
/* CHIPS */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.ch-green{background:var(--green-bg);color:var(--green)}.ch-blue{background:var(--blue-bg);color:var(--blue)}
.ch-amber{background:var(--amber-bg);color:var(--amber)}.ch-red{background:var(--red-bg);color:var(--red)}.ch-gray{background:var(--s3);color:var(--t2)}
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav)+var(--safe-b));padding-bottom:var(--safe-b);background:var(--s1);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;color:var(--t3);font-family:inherit;font-size:10px;font-weight:500;transition:color .15s}
.nav-item.active{color:var(--green)}
.nav-icon{font-size:22px;line-height:1}
/* HEADER — safe area top */
.header-bar{display:flex;justify-content:space-between;align-items:center;padding:calc(12px + var(--safe-t)) 16px 10px;flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border)}
.hb-logo{font-size:16px;font-weight:700;letter-spacing:-.3px}
.avatar-btn{min-width:36px;height:36px;border-radius:50%;background:var(--green);border:none;cursor:pointer;font-size:13px;font-weight:700;color:#0a0a0a;display:flex;align-items:center;justify-content:center;padding:0 8px;white-space:nowrap}
/* SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end}
.sheet{background:var(--s1);border-radius:20px 20px 0 0;padding:20px 20px calc(24px + var(--safe-b));width:100%;max-height:88vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.menu-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;background:none;border-left:none;border-right:none;border-top:none;width:100%;text-align:left;font-family:inherit;color:var(--t1);font-size:14px}
.menu-item:last-child{border-bottom:none}
.menu-item-icon{font-size:20px;width:28px;text-align:center}
/* EXERCISE CHIPS */
.ex-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.ex-chip{display:flex;align-items:center;gap:4px;background:var(--blue-bg);color:var(--blue);border-radius:7px;padding:4px 9px;font-size:12px}
.ex-chip button{background:none;border:none;color:inherit;opacity:.6;cursor:pointer;font-size:15px;padding:0;line-height:1}
/* LOG ENTRIES */
.log-entry{background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:8px}
.le-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.le-title{font-size:14px;font-weight:600}
.le-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.le-exs{margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.le-ex{font-size:12px;color:var(--t2);padding:2px 0;display:flex;justify-content:space-between}
.del-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;padding:0;line-height:1}
.del-btn:hover{color:var(--red)}
/* TODAY */
.today-head{padding:calc(14px + var(--safe-t)) 16px 8px}
.today-greeting{font-size:13px;color:var(--t2);margin-bottom:2px}
.today-day{font-size:24px;font-weight:700;letter-spacing:-.5px}
.week-badge{display:inline-flex;background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:3px 10px;font-size:12px;color:var(--t2);margin-top:5px}
.workout-type-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.workout-name{font-size:17px;font-weight:700;margin-bottom:10px}
.workout-ex-list{list-style:none;margin-bottom:12px}
.workout-ex-list li{font-size:13px;color:var(--t2);padding:3px 0;display:flex;align-items:center;gap:7px}
.workout-ex-list li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}
/* CUSTOMIZE SCHEDULE */
.schedule-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.schedule-item:last-child{border-bottom:none}
.schedule-item-name{flex:1;font-size:13px}
.schedule-arrows{display:flex;flex-direction:column;gap:2px}
.arrow-btn{background:var(--s3);border:none;border-radius:4px;color:var(--t2);cursor:pointer;font-size:13px;padding:2px 6px;line-height:1.4}
/* FOOD */
.date-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.date-nav-btn{padding:8px 14px;background:var(--s3);border:none;border-radius:8px;color:var(--t1);cursor:pointer;font-size:16px}
.date-nav input[type=date]{flex:1}
.builder-card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.macro-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.mc{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.mc-k{background:var(--green-bg);color:var(--green)}.mc-p{background:var(--blue-bg);color:var(--blue)}
.gram-adj{display:flex;align-items:center;gap:8px;margin-top:6px}
.gram-adj span{font-size:11px;color:var(--t2)}
.gram-in{width:72px;padding:6px 8px;text-align:center;font-size:13px}
.rec-note{background:var(--blue-bg);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--blue);margin:5px 0;line-height:1.5}
.qa-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.qa-cat{padding:6px 12px;border-radius:20px;border:1px solid var(--border2);font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:var(--t2);font-family:inherit;transition:all .12s}
.qa-cat.active{background:var(--green);color:#0a0a0a;border-color:var(--green)}
.qa-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.qa-item:last-child{border-bottom:none}
.qa-item-name{font-size:13px;font-weight:500;flex:1}
.qa-item-macros{font-size:11px;color:var(--t2)}
.qa-item-add{padding:5px 12px;background:var(--s3);border:none;border-radius:7px;color:var(--t1);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap}
.custom-row{display:grid;grid-template-columns:1fr 60px 60px auto;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.custom-row input{padding:8px 9px;font-size:13px}
.surplus-box{background:var(--red-bg);border:1px solid #7f1d1d;border-radius:11px;padding:11px 13px;margin-bottom:10px}
.sug-box{background:var(--amber-bg);border:1px solid #78350f;border-radius:11px;padding:11px 13px;margin-bottom:10px}
.sug-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px}
.sug-item:last-child{margin-bottom:0}
.sug-text{font-size:12px;color:var(--t1);flex:1;line-height:1.5}
.sug-add{padding:4px 10px;background:var(--amber);color:#0a0a0a;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.done-card{background:var(--green-bg);border:1px solid var(--green-dim);border-radius:14px;padding:16px}
.done-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 12px}
.done-stat{background:var(--s2);border-radius:9px;padding:10px 12px}
.done-stat-val{font-size:18px;font-weight:700;margin:2px 0}
.done-stat-lbl{font-size:10px;color:var(--t2);text-transform:uppercase}
.done-stat-sub{font-size:11px;margin-top:2px}
/* PROGRESS */
.prog-card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.prog-two{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.prog-lbl{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.prog-val{font-size:16px;font-weight:700}
.prog-sub{font-size:11px;color:var(--t2);margin-top:1px}
.prog-status{display:flex;align-items:center;gap:6px;padding-top:8px;border-top:1px solid var(--border)}
.prog-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.roadmap-toggle{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;background:var(--s2);border:1px solid var(--border);border-radius:12px;cursor:pointer;margin-bottom:6px}
.coll-arr{font-size:12px;color:var(--t2);transition:transform .2s}
.coll-arr.open{transform:rotate(180deg)}
.rm-table{width:100%;border-collapse:collapse;font-size:12px}
.rm-table th{text-align:left;padding:7px 9px;color:var(--t2);font-size:10px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.rm-table td{padding:7px 9px;border-bottom:1px solid var(--border);vertical-align:top}
.rm-table tr:last-child td{border-bottom:none}
.rm-table tr.cur td{background:var(--green-bg)}
.rm-logged{font-size:10px;color:var(--green);margin-top:2px}
/* AUTH */
.auth-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 24px;max-width:420px;margin:0 auto;width:100%}
.auth-logo{text-align:center;font-size:44px;margin-bottom:8px}
.auth-title{text-align:center;font-size:24px;font-weight:700;margin-bottom:3px}
.auth-sub{text-align:center;color:var(--t2);font-size:13px;margin-bottom:24px}
.auth-tabs{display:flex;background:var(--s2);border-radius:10px;padding:3px;margin-bottom:16px}
.auth-tab{flex:1;padding:9px;border:none;background:transparent;color:var(--t2);font-family:inherit;font-size:14px;font-weight:600;border-radius:8px;cursor:pointer}
.auth-tab.active{background:var(--green);color:#0a0a0a}
.msg{padding:10px 12px;border-radius:9px;font-size:13px;margin-bottom:12px;line-height:1.5}
.msg-err{background:var(--red-bg);color:var(--red)}
.msg-ok{background:var(--green-bg);color:var(--green)}
.msg-info{background:var(--blue-bg);color:var(--blue)}
/* LOADING */
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--t2)}
.spinner{width:30px;height:30px;border:3px solid var(--s3);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ONBOARDING */
.ob-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 20px calc(20px + var(--safe-b))}
.ob-inner{max-width:420px;margin:0 auto;padding-top:calc(var(--safe-t) + 10px)}
.step-dots{display:flex;justify-content:center;gap:6px;margin-bottom:20px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--s3);transition:all .2s}
.step-dot.active{background:var(--green);width:22px;border-radius:4px}
.ob-emoji{font-size:52px;text-align:center;margin-bottom:10px}
.ob-title{font-size:24px;font-weight:800;text-align:center;margin-bottom:8px;letter-spacing:-.5px}
.ob-sub{color:var(--t2);font-size:14px;text-align:center;line-height:1.6;margin-bottom:28px}
.ob-section{font-size:12px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.pick-btn{padding:11px 8px;background:var(--s2);border:2px solid var(--border);border-radius:11px;cursor:pointer;font-family:inherit;color:var(--t1);font-size:12px;font-weight:500;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px}
.pick-btn.sel{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.pick-btn .pick-icon{font-size:22px}
.pick-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
.pick-pill{padding:8px 14px;background:var(--s2);border:2px solid var(--border);border-radius:20px;cursor:pointer;font-family:inherit;color:var(--t1);font-size:13px;font-weight:500;transition:all .15s}
.pick-pill.sel{border-color:var(--green);background:var(--green-bg);color:var(--green)}
/* ADMIN */
.admin-user{display:flex;align-items:center;gap:12px;padding:11px 13px;background:var(--s2);border:1px solid var(--border);border-radius:11px;margin-bottom:7px;cursor:pointer}
.admin-user:hover{border-color:var(--green-dim)}
.admin-av{width:40px;height:40px;border-radius:50%;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.back-btn{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--t2);cursor:pointer;font-family:inherit;font-size:13px;margin-bottom:12px;padding:0}
/* CARDIO */
.cardio-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.cardio-box{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:10px;text-align:center}
.cardio-box label{display:block;font-size:10px;color:var(--t2);text-transform:uppercase;margin-bottom:4px}
.cardio-box input{background:transparent;border:none;text-align:center;font-size:18px;font-weight:700;color:var(--t1);width:100%;padding:0}
.empty{text-align:center;padding:30px 16px;color:var(--t3);font-size:13px;line-height:1.6}
/* OPTIMIZE */
.opt-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px}
.opt-card{background:var(--s2);border:1px solid var(--green-dim);border-radius:20px;padding:24px;max-width:340px;width:100%;text-align:center}
</style>
</head>

const todayStr=()=>new Date().toISOString().split('T')[0];
const fmtDate=s=>{const d=new Date(s+'T12:00:00');const D=['Sön','Mån','Tis','Ons','Tor','Fre','Lör'],M=['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];return `${D[d.getDay()]} ${d.getDate()} ${M[d.getMonth()]}`;};
const fmtDateLong=s=>{const d=new Date(s+'T12:00:00');const D=['Söndag','Måndag','Tisdag','Onsdag','Torsdag','Fredag','Lördag'];const M=['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];return `${D[d.getDay()]} ${d.getDate()} ${M[d.getMonth()]}`;};
const getWeek=wo=>{const w=wo.map(x=>parseInt(x.week)).filter(x=>!isNaN(x)&&x>0);return w.length?Math.max(...w):22;};
const getStep=(steps,wk)=>{for(const s of steps)if(wk>=s.w[0]&&wk<=s.w[1])return s;return wk>steps[steps.length-1].w[1]?steps[steps.length-1]:steps[0];};
const getBestKg=(wo,n,wk)=>{let b=null;wo.forEach(w=>{if(parseInt(w.week)!==wk||!w.exercises)return;w.exercises.forEach(e=>{if(e.name===n&&e.kg){const kg=parseFloat(e.kg);if(!b||kg>b.kg)b={kg,sets:parseInt(e.sets)||0,reps:parseInt(e.reps)||0};}});});return b;};
const getBestReps=(wo,n,wk)=>{let b=null;wo.forEach(w=>{if(parseInt(w.week)!==wk||!w.exercises)return;w.exercises.forEach(e=>{if(e.name===n&&e.reps){const r=parseInt(e.reps);if(!b||r>b.reps)b={reps:r,sets:parseInt(e.sets)||0,kg:parseFloat(e.kg)||0};}});});return b;};
const calcMac=(arr,i,g)=>{if(i<0||!arr[i])return{k:0,p:0};const x=arr[i],r=g/100;return{k:Math.round(x.k*r),p:Math.round(x.p*r)};};
const isCardioType=t=>t&&/(löpning|cardio|promenad|powerwalk|cykling|simning|intervall)/i.test(t);
const isRefereeType=t=>t&&/(domare|dömt)/i.test(t);
const getInitials=n=>{if(!n)return '?';return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);};
function updateSlider(el){if(!el)return;const v=(el.value-el.min)/(el.max-el.min)*100;el.style.background=`linear-gradient(to right,var(--green) ${v}%,var(--s3) ${v}%)`;}
function getActivePlan(profile){
  if(!profile)return DEFAULT_PLAN;
  if(profile.custom_schedule&&Object.keys(profile.custom_schedule).length>0){
    const cs=profile.custom_schedule;
    const plan={...DEFAULT_PLAN};
    Object.keys(cs).forEach(day=>{if(plan[day])plan[day]={...plan[day],exs:cs[day]};});
    return plan;
  }
  const g=profile.goals&&profile.goals[0];
  return (g&&GOAL_PLANS[g])||DEFAULT_PLAN;
}

function PBar({label,val,max,unit=''}){
  const pct=Math.min(100,Math.round((val/Math.max(max,1))*100));
  const col=pct>=95?'var(--green)':pct>=70?'var(--amber)':'var(--blue)';
  return <div className="pbar-wrap"><div className="pbar-row"><span className="pbar-label">{label}</span><span className="pbar-nums">{val} / {max}{unit}{pct>=95?' ✅':''}</span></div><div className="pbar-bg"><div className="pbar-fill" style={{width:pct+'%',background:col}}/></div></div>;
}
const Chip=({c,ch})=><span className={`chip ch-${c||'gray'}`}>{ch}</span>;

function Slider({label,min=0,max=10,value,onChange,lo,hi}){

function AuthScreen(){
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');const [pw,setPw]=useState('');const [name,setName]=useState('');
  const [msg,setMsg]=useState(null);const [busy,setBusy]=useState(false);
  async function submit(){
    if(!email||!pw)return setMsg({t:'err',m:'Fyll i e-post och lösenord.'});
    setBusy(true);setMsg(null);
    if(mode==='signup'){
      const {error}=await sb.auth.signUp({email,password:pw,options:{data:{name},emailRedirectTo:window.location.href}});
      if(error)setMsg({t:'err',m:error.message});
      else setMsg({t:'ok',m:'✅ Konto skapat! Kolla mejlen (även skräpposten) — bekräfta länken, logga sedan in.'});
    }else{
      const {error}=await sb.auth.signInWithPassword({email,password:pw});
      if(error)setMsg({t:'err',m:error.message==='Invalid login credentials'?'Fel e-post eller lösenord. Har du bekräftat mejladressen?':error.message});
    }
    setBusy(false);
  }
  return <div className="auth-wrap">
    <div className="auth-logo">🏋️</div>
    <div className="auth-title">FitTrack</div>
    <div className="auth-sub">Din personliga träningsapp</div>
    <div className="auth-tabs">
      <button className={`auth-tab${mode==='login'?' active':''}`} onClick={()=>{setMode('login');setMsg(null);}}>Logga in</button>
      <button className={`auth-tab${mode==='signup'?' active':''}`} onClick={()=>{setMode('signup');setMsg(null);}}>Skapa konto</button>
    </div>
    {msg&&<div className={`msg ${msg.t==='err'?'msg-err':'msg-ok'}`}>{msg.m}</div>}
    {mode==='signup'&&<div className="field"><label>Namn</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Ditt namn"/></div>}
    <div className="field"><label>E-post</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="din@mejl.se" autoComplete="email"/></div>
    <div className="field"><label>Lösenord</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Minst 6 tecken" autoComplete={mode==='signup'?'new-password':'current-password'}/></div>
    <button className="btn btn-primary btn-full" disabled={busy} onClick={submit} style={{marginTop:8}}>{busy?'...':mode==='login'?'Logga in':'Skapa konto'}</button>
    {mode==='login'&&<p style={{textAlign:'center',fontSize:12,color:'var(--t2)',marginTop:10}}>Bekräftelsemejlet hamnar ibland i skräpposten.</p>}
  </div>;
}

        <button className="btn btn-primary btn-full" disabled={goals.length===0} onClick={()=>setStep(3)}>Nästa →</button>
      </>}

// ── CUSTOMIZE WORKOUT SHEET ───────────────────────────────────
function CustomizeSheet({dayNum,plan,onSave,onClose}){
  const [exs,setExs]=useState([...(plan.exs||[])]);
  const [sel,setSel]=useState('');
  const allEx=Object.values(EX_GROUPS).flat();
  function addEx(){if(!sel)return;setExs(p=>[...p,sel]);setSel('');}
  function move(i,d){const a=[...exs];const t=a[i];a[i]=a[i+d];a[i+d]=t;setExs(a);}
  return <div className="sheet-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="sheet">
      <div className="sheet-handle"/>
      <h2 style={{marginBottom:4}}>Anpassa {plan.name}</h2>
      <p style={{fontSize:13,color:'var(--t2)',marginBottom:14}}>Ändringar sparas till ditt personliga schema.</p>
      <div className="field">
        <label>Lägg till övning</label>
        <div style={{display:'flex',gap:8}}>
          <select value={sel} onChange={e=>setSel(e.target.value)} style={{flex:1,fontSize:13,padding:'8px 10px'}}>
            <option value="">Välj...</option>
            {Object.entries(EX_GROUPS).map(([g,es])=><optgroup key={g} label={g}>{es.map(e=><option key={e}>{e}</option>)}</optgroup>)}
          </select>
          <button className="btn btn-secondary btn-sm" onClick={addEx} style={{flexShrink:0}}>+</button>
        </div>
      </div>
      <div style={{marginBottom:14}}>
        {exs.map((e,i)=><div key={i} className="schedule-item">
          <span className="schedule-item-name">{e}</span>
          <div className="schedule-arrows">
            <button className="arrow-btn" disabled={i===0} onClick={()=>move(i,-1)}>▲</button>
            <button className="arrow-btn" disabled={i===exs.length-1} onClick={()=>move(i,1)}>▼</button>
          </div>
          <button className="del-btn" onClick={()=>setExs(p=>p.filter((_,j)=>j!==i))}>×</button>
        </div>)}
      </div>
      <button className="btn btn-primary btn-full" onClick={()=>onSave(dayNum,exs)}>💾 Spara schema</button>
    </div>
  </div>;
}

          <input type="number" value={exSets} onChange={e=>setExSets(e.target.value)} placeholder="Set" style={{fontSize:12,padding:'7px 4px',textAlign:'center'}}/>
          <input type="number" value={exReps} onChange={e=>setExReps(e.target.value)} placeholder="Rep" style={{fontSize:12,padding:'7px 4px',textAlign:'center'}}/>
          <input type="number" step="0.5" value={exKg} onChange={e=>setExKg(e.target.value)} placeholder="kg" style={{fontSize:12,padding:'7px 4px',textAlign:'center'}}/>

// ── FOOD ──────────────────────────────────────────────────────
const INIT_MLB={pI:-1,pG:200,cI:-1,cG:100,vI:-1,vG:150,fI:0};
function FoodScreen({meals,mealsDone,addMeal,deleteMeal,setDayDone}){
  const [dayType,setDayType]=useState(DAY_TYPE_MAP[new Date().getDay()]);
  const [vd,setVd]=useState(todayStr());
  const [qaCat,setQaCat]=useState('Frukost');
  const [mlb,setMlb]=useState({...INIT_MLB});
  const [ca,setCa]=useState({n:'',k:'',p:''});
  const tgt=DAY_TARGETS[dayType];
  const entries=meals[vd]||[];
  const tot=entries.reduce((t,e)=>({kcal:t.kcal+(e.kcal||0),protein:t.protein+(e.protein||0)}),{kcal:0,protein:0});
  const isDone=!!mealsDone[vd];
  const isToday=vd===todayStr();
  const surplus=tot.kcal>tgt.k+200;
  const rem={k:tgt.k-tot.kcal,p:tgt.p-tot.protein};
  const pName=mlb.pI>=0&&PROTEINS[mlb.pI]?PROTEINS[mlb.pI].n:'';
  const cRec=pName&&PAIRINGS[pName]?PAIRINGS[pName]:'';
  const cRecI=cRec?CARBS.findIndex(x=>x.n===cRec):-1;
  const effCI=mlb.cI>=0?mlb.cI:cRecI;
  const mP=calcMac(PROTEINS,mlb.pI,mlb.pG),mC=calcMac(CARBS,effCI,mlb.cG),mV=calcMac(VEGS,mlb.vI,mlb.vG);
  const mFk=mlb.fI>0&&FATS[mlb.fI]?FATS[mlb.fI].k:0;
  const mbTot={k:mP.k+mC.k+mV.k+mFk,p:mP.p+mC.p+mV.p};
  function mlbAdd(){
    if(!mbTot.k&&!mbTot.p)return;
    const parts=[];
    if(mlb.pI>=0)parts.push(`${mlb.pG}g ${PROTEINS[mlb.pI].n}`);
    if(effCI>=0&&CARBS[effCI]&&CARBS[effCI].k>0)parts.push(`${mlb.cG}g ${CARBS[effCI].n.replace(' (torrt)','').replace(' (rå)','').replace(' Frebaco','')}`);
    if(mlb.vI>=0&&VEGS[mlb.vI])parts.push(`${mlb.vG}g ${VEGS[mlb.vI].n}`);
    if(mlb.fI>0)parts.push(FATS[mlb.fI].n);
    addMeal(vd,parts.join(' + ')||'Måltid',mbTot.k,mbTot.p);setMlb({...INIT_MLB});
  }
  function addCustom(){if(!ca.n||!ca.k)return;addMeal(vd,ca.n,+ca.k,+ca.p||0);setCa({n:'',k:'',p:''});}
  const sugs=[];
  if(!surplus&&rem.k>0&&rem.k<=150&&rem.p<=10)sugs.push({icon:'🍌',text:`${rem.k} kcal kvar — en banan (89) passar`,n:'1 banan',k:89,p:1});
  if(!surplus&&rem.p>0&&rem.p<=30&&rem.k<=250)sugs.push({icon:'💪',text:`${rem.p}g protein kvar — proteinshake (+25g)`,n:'Proteinshake + vatten',k:120,p:25});
  const navDate=(d)=>{const x=new Date(vd+'T12:00:00');x.setDate(x.getDate()+d);const s=x.toISOString().split('T')[0];setVd(s>todayStr()?todayStr():s);};
  return <div className="screen"><div className="pad">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <h2>Mat</h2>
      <select value={dayType} onChange={e=>setDayType(e.target.value)} style={{width:'auto',fontSize:12,padding:'6px 10px'}}>
        <option value="tuesday">Tisdag — 2800</option><option value="gym">Gym — 2400</option>
        <option value="football">Fotboll — 2600</option><option value="rest">Vila — 2200</option>
      </select>
    </div>
    <div className="date-nav">
      <button className="date-nav-btn" onClick={()=>navDate(-1)}>‹</button>
      <input type="date" value={vd} onChange={e=>setVd(e.target.value)}/>
      <button className="date-nav-btn" onClick={()=>navDate(1)}>›</button>
    </div>
    {!isToday&&<div className="msg msg-info" style={{marginBottom:10}}>📅 Historik: {fmtDate(vd)}</div>}
    <div className="card">
      <div className="card-title">Dagstotal</div>
      <PBar label="🔥 Kalorier" val={tot.kcal} max={tgt.k} unit=" kcal"/>
      <PBar label="💪 Protein" val={tot.protein} max={tgt.p} unit="g"/>
    </div>
    {surplus&&<div className="surplus-box">
      <div style={{fontSize:13,fontWeight:600,color:'var(--red)',marginBottom:3}}>⚠️ Kaloriöverskott +{tot.kcal-tgt.k} kcal</div>
      <div style={{fontSize:12,color:'var(--t2)',lineHeight:1.5}}>Du ligger {tot.kcal-tgt.k} kcal över dagsmålet ({tgt.k} kcal). {dayType==='rest'?'Vilodagar bör ha ett underskott för att nå viktnedgångsmålet.':dayType==='gym'?'Gymdagar bör ha ett lätt underskott.':'Justera kvällssnacket eller middagen.'}</div>

          <div className="field"><label>Proteinkälla (rå vikt)</label><select value={mlb.pI} onChange={e=>setMlb(m=>({...m,pI:+e.target.value,cI:-1}))}><option value="-1">Välj protein...</option>{PROTEINS.map((x,i)=><option key={i} value={i}>{x.n} — {x.k} kcal/100g</option>)}</select>{mlb.pI>=0&&<div className="gram-adj"><span>Gram (rå):</span><input className="gram-in" type="number" value={mlb.pG} onChange={e=>setMlb(m=>({...m,pG:+e.target.value||200}))}/></div>}</div>

          <div className="field"><label>Kolhydrat (okokt/torrt)</label><select value={mlb.cI>=0?mlb.cI:cRecI} onChange={e=>setMlb(m=>({...m,cI:+e.target.value}))}><option value="-1">Välj...</option>{CARBS.map((x,i)=><option key={i} value={i}>{x.n}</option>)}</select>{(mlb.cI>=0||cRecI>=0)&&<div className="gram-adj"><span>Gram:</span><input className="gram-in" type="number" value={mlb.cG} onChange={e=>setMlb(m=>({...m,cG:+e.target.value||0}))}/></div>}</div>
          <div className="field"><label>Grönsaker</label><select value={mlb.vI} onChange={e=>setMlb(m=>({...m,vI:+e.target.value}))}><option value="-1">Ingen / välj...</option>{VEGS.map((x,i)=><option key={i} value={i}>{x.n}</option>)}</select>{mlb.vI>=0&&<div className="gram-adj"><span>Gram:</span><input className="gram-in" type="number" value={mlb.vG} onChange={e=>setMlb(m=>({...m,vG:+e.target.value||0}))}/></div>}</div>

      {isToday&&entries.length>0&&<button className="btn btn-primary btn-full" style={{marginTop:4}} onClick={()=>setDayDone(vd,true)}>✅ Slutför dagen</button>}
    </>}
  </div></div>;
}
function DoneCard({totals,tgt,entries,onUndo}){
  const kp=Math.round(totals.kcal/tgt.k*100),pp=Math.round(totals.protein/tgt.p*100);
  const ok=s=>s>=95?{c:'var(--green)',t:'✅ Nått'}:s>=80?{c:'var(--amber)',t:'Nära'}:{c:'var(--red)',t:'Under'};
  return <div className="done-card"><div style={{fontSize:16,fontWeight:700,color:'var(--green)',marginBottom:10}}>🎉 Dagen slutförd</div>
    <div className="done-grid"><div className="done-stat"><div className="done-stat-lbl">Kalorier</div><div className="done-stat-val">{totals.kcal}</div><div className="done-stat-sub" style={{color:ok(kp).c}}>{ok(kp).t} ({tgt.k})</div></div><div className="done-stat"><div className="done-stat-lbl">Protein</div><div className="done-stat-val">{totals.protein}g</div><div className="done-stat-sub" style={{color:ok(pp).c}}>{ok(pp).t} ({tgt.p}g)</div></div><div className="done-stat"><div className="done-stat-lbl">Måltider</div><div className="done-stat-val">{entries.length}</div></div><div className="done-stat"><div className="done-stat-lbl">P% energi</div><div className="done-stat-val">{totals.kcal?Math.round(totals.protein*4/totals.kcal*100):0}%</div></div></div>
    <div style={{fontSize:13,color:'var(--green)',marginBottom:10}}>{kp>=95&&pp>=95?'Perfekt dag! 💪':kp>=80&&pp>=80?'Bra dag — nära båda målen.':'På rätt väg — justera imorgon.'}</div>
    <button className="btn btn-ghost btn-sm" onClick={onUndo}>↩ Ångra</button>
  </div>;
}

// ── PROGRESS ──────────────────────────────────────────────────
function ProgressScreen({workouts}){
  const [rm,setRm]=useState(false);
  const week=getWeek(workouts);
  const bwStep=getStep(BW_TARGETS,week);
  const bwWo=workouts.filter(w=>w.bodyweight);
  const latestBW=bwWo.length?parseFloat(bwWo[0].bodyweight):null;
  const bwDiff=latestBW!=null?latestBW-bwStep.bw:null;
  return <div className="screen"><div className="pad">
    <div style={{marginBottom:14}}><h2>Progress</h2><div style={{display:'flex',gap:7,marginTop:6,flexWrap:'wrap'}}><Chip c="blue" ch={`Vecka ${week}`}/><Chip c="gray" ch="Mål: 84–85 kg"/></div></div>
    <div className="prog-card"><div style={{fontSize:15,fontWeight:600,marginBottom:8}}>⚖️ Kroppsvikt</div><div className="prog-two"><div><div className="prog-lbl">Veckans mål</div><div className="prog-val">{bwStep.bw} kg</div><div className="prog-sub">v{bwStep.w[0]}–{bwStep.w[1]}</div></div><div><div className="prog-lbl">Senast</div><div className="prog-val">{latestBW!=null?`${latestBW} kg`:'—'}</div></div></div><div className="prog-status"><div className="prog-dot" style={{background:bwDiff==null?'var(--t3)':bwDiff<=0.5?'var(--green)':'var(--amber)'}}/><span style={{fontSize:12,fontWeight:500}}>{bwDiff==null?'Ej loggad':bwDiff<=-0.5?`${Math.abs(bwDiff).toFixed(1)} kg under — bra 🎯`:bwDiff<=0.5?'På målet ✓':`${bwDiff.toFixed(1)} kg över`}</span></div></div>
    {Object.entries(PROGRESSIONS).map(([name,prog])=>{
      const step=getStep(prog.steps,week);let tgtTxt,logTxt,dot,txt;
      if(prog.type==='kg'){tgtTxt=`${step.kg} kg · ${step.s}×${step.r}`;const b=getBestKg(workouts,name,week);if(!b){logTxt='—';dot='var(--t3)';txt='Ej loggat';}else{logTxt=`${b.kg} kg · ${b.sets}×${b.reps}`;const d=b.kg-step.kg;if(d>0){dot='var(--green)';txt=`+${d} kg över schemat 🎯`;}else if(d===0){dot='var(--green)';txt='På schemat ✓';}else{dot='var(--amber)';txt=`${Math.abs(d)} kg under`;}}}
      else{tgtTxt=`${step.s}×${step.rt} reps · ${step.note}`;const b=getBestReps(workouts,name,week);if(!b){logTxt='—';dot='var(--t3)';txt='Ej loggat';}else{logTxt=`${b.sets}×${b.reps}${b.kg?` +${b.kg}kg`:''}`;const d=b.reps-step.rt;if(d>0){dot='var(--green)';txt=`+${d} reps 🎯`;}else if(d===0){dot='var(--green)';txt='På schemat ✓';}else{dot='var(--amber)';txt=`${Math.abs(d)} reps under`;}}}
      return <div key={name} className="prog-card"><div style={{fontSize:15,fontWeight:600,marginBottom:8}}>{prog.icon} {name}</div><div className="prog-two"><div><div className="prog-lbl">Veckans mål</div><div className="prog-val" style={{fontSize:13}}>{tgtTxt}</div></div><div><div className="prog-lbl">Bäst v.{week}</div><div className="prog-val" style={{fontSize:13,color:dot!=='var(--t3)'?dot:'var(--t2)'}}>{logTxt}</div></div></div><div className="prog-status"><div className="prog-dot" style={{background:dot}}/><span style={{fontSize:12,fontWeight:500}}>{txt}</span></div></div>;
    })}
    <div className="roadmap-toggle" onClick={()=>setRm(o=>!o)}><span style={{fontSize:13,fontWeight:600}}>Hela planen v22–32</span><span className={`coll-arr${rm?' open':''}`}>▼</span></div>
    {rm&&<div style={{background:'var(--s2)',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden',marginBottom:8}}><table className="rm-table"><thead><tr><th>Veckor</th><th>Knäböj</th><th>RDL</th><th>Bänk</th><th>Chins</th></tr></thead><tbody>{PROGRESSIONS['Knäböj (Back Squat)'].steps.map((s,i)=>{const rs=PROGRESSIONS['Rumänsk marklyft (RDL)'].steps[i],bs=PROGRESSIONS['Bänkpress'].steps[i],cs=PROGRESSIONS['Chins (Pull-ups)'].steps[i];const cur=week>=s.w[0]&&week<=s.w[1];const sqB=getBestKg(workouts,'Knäböj (Back Squat)',week);return <tr key={i} className={cur?'cur':''}><td><strong>{s.w[0]}–{s.w[1]}</strong>{cur&&<div style={{fontSize:9,color:'var(--green)',fontWeight:600}}>◀ Nu</div>}</td><td>{s.kg}kg<br/><span style={{fontSize:10,color:'var(--t2)'}}>{s.s}×{s.r}</span>{cur&&sqB&&<div className="rm-logged">✓ {sqB.kg}kg</div>}</td><td>{rs.kg}kg<br/><span style={{fontSize:10,color:'var(--t2)'}}>{rs.s}×{rs.r}</span></td><td>{bs.kg}kg<br/><span style={{fontSize:10,color:'var(--t2)'}}>{bs.s}×{bs.r}</span></td><td>{cs.s}×{cs.rt}<br/><span style={{fontSize:10,color:'var(--t2)'}}>{cs.note}</span></td></tr>;})}</tbody></table></div>}
  </div></div>;
}

// ── APP ROOT ───────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState('today');
  const [session,setSession]=useState(null);
  const [loading,setLoading]=useState(true);
  const [profile,setProfile]=useState(null);
  const [needOnboarding,setNeedOnboarding]=useState(false);
  const [showProfile,setShowProfile]=useState(false);
  const [showOptimize,setShowOptimize]=useState(false);
  const [workouts,setWorkouts]=useState([]);
  const [meals,setMeals]=useState({});
  const [mealsDone,setMealsDone]=useState({});
  const [customExercises,setCustomExercises]=useState([]);
  const [allWorkouts,setAllWorkouts]=useState([]);
  const [allProfiles,setAllProfiles]=useState([]);

  const isAdmin=session?.user?.email===ADMIN;

  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{setSession(data.session);if(!data.session)setLoading(false);});
    const {data:l}=sb.auth.onAuthStateChange((_,s)=>{setSession(s);if(!s)setLoading(false);});
    return ()=>l.subscription.unsubscribe();
  },[]);

  useEffect(()=>{if(session)loadAll();},[session]);

  async function loadAll(){
    const uid=session.user.id;
    // ✅ Always filter by user_id — fixes data isolation bug
    const {data:wo}=await sb.from('workouts').select('*').eq('user_id',uid).order('date',{ascending:false});
    setWorkouts(wo||[]);
    const {data:ml}=await sb.from('meals').select('*').eq('user_id',uid).order('created_at',{ascending:true});
    const g={};(ml||[]).forEach(m=>{(g[m.date]=g[m.date]||[]).push(m);});setMeals(g);
    const {data:md}=await sb.from('meal_days').select('*').eq('user_id',uid);
    const dn={};(md||[]).forEach(d=>{dn[d.date]=d.completed;});setMealsDone(dn);
    // Load profile
    const {data:pr,error:prErr}=await sb.from('user_profiles').select('*').eq('user_id',uid).maybeSingle();
    if(pr&&pr.onboarding_done){
      setProfile(pr);
      // Check optimize popup (2 months = 56 days)
      if(pr.first_log_date&&!pr.optimize_shown){
        const diff=(new Date()-new Date(pr.first_log_date))/(86400000);
        if(diff>=56)setShowOptimize(true);
      }
    } else {
      setNeedOnboarding(true);
    }
    // Load exercises
    const {data:exs}=await sb.from('exercises').select('*');
    setCustomExercises(exs||[]);
    // Admin: load all users data via RPC
    if(session.user.email===ADMIN){
      const {data:aWo}=await sb.rpc('admin_get_workouts').catch(()=>({data:[]}));
      setAllWorkouts(aWo||[]);
      const {data:aPr}=await sb.rpc('admin_get_profiles').catch(()=>({data:[]}));
      setAllProfiles(aPr||[]);
    }
    setLoading(false);
  }

  async function addWorkout(w){
    // Explicitly set user_id to prevent any isolation issues
    const {data}=await sb.from('workouts').insert({...w,user_id:session.user.id}).select().single();
    if(data){
      setWorkouts(p=>[data,...p]);
      if(isAdmin)setAllWorkouts(p=>[data,...p]);
      if(profile&&!profile.first_log_date){
        await sb.from('user_profiles').update({first_log_date:w.date}).eq('user_id',session.user.id);
        setProfile(pr=>({...pr,first_log_date:w.date}));
      }
    }
  }
  async function deleteWorkout(id){await sb.from('workouts').delete().eq('id',id);setWorkouts(p=>p.filter(w=>w.id!==id));}
  async function addMeal(date,name,kcal,protein){const {data}=await sb.from('meals').insert({date,name,kcal:Math.round(kcal)||0,protein:Math.round(protein)||0,user_id:session.user.id}).select().single();if(data)setMeals(p=>({...p,[date]:[...(p[date]||[]),data]}));}
  async function deleteMeal(date,id){await sb.from('meals').delete().eq('id',id);setMeals(p=>({...p,[date]:(p[date]||[]).filter(e=>e.id!==id)}));}
  async function setDayDone(date,done){await sb.from('meal_days').upsert({date,completed:done,user_id:session.user.id},{onConflict:'user_id,date'});setMealsDone(p=>({...p,[date]:done}));}
  async function addExercise(name,category){const {data}=await sb.from('exercises').insert({name,category}).select().single();if(data)setCustomExercises(p=>[data,...p]);}
  async function deleteExercise(id){await sb.from('exercises').delete().eq('id',id);setCustomExercises(p=>p.filter(e=>e.id!==id));}

  async function saveSchedule(dayNum,exs){
    const cs={...(profile?.custom_schedule||{}),[dayNum]:exs};
    await sb.from('user_profiles').update({custom_schedule:cs}).eq('user_id',session.user.id);
    setProfile(p=>({...p,custom_schedule:cs}));
  }

  const mealTotals=useMemo(()=>{const e=meals[todayStr()]||[];return e.reduce((t,x)=>({kcal:t.kcal+(x.kcal||0),protein:t.protein+(x.protein||0)}),{kcal:0,protein:0});},[meals]);

  if(loading)return <div className="loading"><div className="spinner"/><div style={{fontSize:13}}>Laddar...</div></div>;
  if(!session)return <AuthScreen/>;
  if(needOnboarding)return <OnboardingScreen session={session} existingProfile={profile} onDone={updatedProfile=>{setProfile({...updatedProfile,user_id:session.user.id,email:session.user.email,display_name:session.user.user_metadata?.name||session.user.email.split('@')[0]});setNeedOnboarding(false);}}/>;

  const name=profile?.display_name||session.user.user_metadata?.name||session.user.email;

  return <div style={{display:'flex',flexDirection:'column',height:'100%',background:'var(--bg)'}}>
    <div className="header-bar">
      <span className="hb-logo">🏋️ FitTrack</span>
      <button className="avatar-btn" onClick={()=>setShowProfile(true)} title="Profil">{getInitials(name)}</button>
    </div>
    {tab==='today'&&<TodayScreen workouts={workouts} mealTotals={mealTotals} onGoTrain={()=>setTab('training')} onGoFood={()=>setTab('food')} profile={profile} onSaveSchedule={saveSchedule}/>}
    {tab==='training'&&<TrainingScreen workouts={workouts} addWorkout={addWorkout} deleteWorkout={deleteWorkout} profile={profile} customExercises={customExercises}/>}
    {tab==='food'&&<FoodScreen meals={meals} mealsDone={mealsDone} addMeal={addMeal} deleteMeal={deleteMeal} setDayDone={setDayDone}/>}
    {tab==='progress'&&<ProgressScreen workouts={workouts}/>}
    {tab==='admin'&&isAdmin&&<AdminScreen allWorkouts={allWorkouts} allProfiles={allProfiles} customExercises={customExercises} addExercise={addExercise} deleteExercise={deleteExercise}/>}
    <BottomNav tab={tab} setTab={setTab} isAdmin={isAdmin}/>
    {showProfile&&<ProfileSheet session={session} profile={profile} onClose={()=>setShowProfile(false)} onLogout={()=>{sb.auth.signOut();setShowProfile(false);}} onEditGoals={()=>{setShowProfile(false);setNeedOnboarding(true);}}/>}
    {showOptimize&&<div className="opt-overlay"><div className="opt-card"><div style={{fontSize:44,marginBottom:10}}>🚀</div><div style={{fontSize:18,fontWeight:700,marginBottom:7}}>Dags att optimera!</div><div style={{fontSize:14,color:'var(--t2)',lineHeight:1.6,marginBottom:18}}>Du har tränat i ~2 månader. Vill du uppdatera dina mål och optimera träningsschemat?</div><button className="btn btn-primary btn-full" style={{marginBottom:8}} onClick={()=>{setShowOptimize(false);setNeedOnboarding(true);sb.from('user_profiles').update({optimize_shown:true}).eq('user_id',session.user.id);}}>Ja, uppdatera!</button><button className="btn btn-ghost btn-full btn-sm" onClick={async()=>{setShowOptimize(false);await sb.from('user_profiles').update({optimize_shown:true}).eq('user_id',session.user.id);}}>Inte nu</button></div></div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));</script>
</body>
</html>
